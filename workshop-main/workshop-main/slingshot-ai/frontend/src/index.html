<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slingshot AI</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header class="topbar">
      <h1>Slingshot AI</h1>
      <p>AI-Powered Startup Growth Intelligence Platform</p>
    </header>

    <main class="container">
      <section class="cards" id="metric-cards"></section>

      <section class="panel">
        <h2>Revenue & Forecast</h2>
        <canvas id="revenueChart"></canvas>
      </section>

      <section class="panel two-column">
        <div>
          <h2>CSV Input</h2>
          <p>Upload your own startup metrics CSV or use the sample dataset.</p>
          <input type="file" id="csv-upload" accept=".csv" />
          <button id="predict-btn">Predict Next 3 Months</button>
        </div>
        <div>
          <h2>AI Growth Assistant</h2>
          <div class="chat-window" id="chat-window"></div>
          <div class="chat-controls">
            <input id="chat-input" placeholder="Ask about growth strategy..." />
            <button id="chat-send">Send</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
